<!-- CSS DA TASKBAR -->
<link rel="stylesheet" href="assets/css/windows_task.css">

<div class="windows-taskbar" id="windowsTaskbar">

    <!-- BANDEIRA DO WINDOWS -->
    <button
        class="windows-start-button"
        id="windowsStartButton"
        aria-label="Iniciar"
    >
        <img
            src="/WebSite/assets/images/vista_start.png"
            alt="Windows Start"
            draggable="false"
        >
    </button>


    <!-- PROGRAMAS NA BARRA DE TAREFAS -->
    <div class="windows-taskbar-icons">

        <button
            class="taskbar-program"
            data-program="windows_popups/gabrielzinho/main_gabrielzinho.html"
            data-id="programaGabrielzinho"
        >
            <img
                src="assets/icones/vista_messenger.ico"
                alt="Gabrielzinho"
            >
        </button>


        <button
            class="taskbar-program"
            data-program="windows_popups/gabrielzinho/main_gabrielzinho.html"
            data-id="programaGabrielzinho"
        >
            <img
                src="assets/icones/vista_firewall_status_1.ico"
                alt="Gabrielzinho"
            >
        </button>

    </div>


    <!-- HORÁRIO ATUAL -->
    <div
        class="windows-taskbar-clock"
        id="windowsTaskbarClock"
    >
        --:--
    </div>

</div>
