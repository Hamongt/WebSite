<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkyLike Desktop</title>

    <link rel="stylesheet" href="assets/css/principal.css">

</head>

<body>

    <!-- ==========================================
         PROGRAMAS ABERTOS
         ========================================== -->
    <div id="programas-container"></div>


    <!-- ==========================================
         TASKBAR
         O windows_task.html será inserido aqui
         via fetch()
         ========================================== -->
    <div id="windows-task-container"></div>


    <script src="assets/scripts/windows_task.js"></script>

    <script>
        /*
         * =========================================================
         * CARREGADOR DE HTML POR FETCH
         * =========================================================
         *
         * Esta função permite carregar um arquivo HTML dentro
         * de uma DIV sem usar iframe.
         *
         * Ela também:
         * - corrige caminhos relativos de src/href;
         * - importa CSS encontrado no <head>;
         * - executa scripts externos e scripts inline.
         *
         * IMPORTANTE:
         * fetch() precisa rodar por HTTP/HTTPS.
         * Use Live Server durante o desenvolvimento.
         */

        async function carregarHTML(caminho, destino) {

            const elementoDestino =
                typeof destino === "string"
                    ? document.getElementById(destino)
                    : destino;

            if (!elementoDestino) {
                console.error(
                    "Destino não encontrado para carregar:",
                    caminho
                );
                return;
            }

            try {

                const resposta = await fetch(caminho);

                if (!resposta.ok) {
                    throw new Error(
                        `Erro HTTP ${resposta.status} ao carregar ${caminho}`
                    );
                }

                const textoHTML = await resposta.text();

                const parser = new DOMParser();

                const documento = parser.parseFromString(
                    textoHTML,
                    "text/html"
                );

                /*
                 * URL base do arquivo carregado.
                 * Serve para corrigir caminhos relativos.
                 */
                const urlBase = new URL(
                    caminho,
                    window.location.href
                );


                /*
                 * ==========================================
                 * IMPORTA CSS DO HTML CARREGADO
                 * ==========================================
                 */

                documento
                    .querySelectorAll('link[rel="stylesheet"]')
                    .forEach(link => {

                        const hrefOriginal =
                            link.getAttribute("href");

                        if (!hrefOriginal) {
                            return;
                        }

                        const hrefFinal =
                            new URL(
                                hrefOriginal,
                                urlBase
                            ).href;

                        /*
                         * Evita importar o mesmo CSS várias vezes.
                         */
                        const jaExiste =
                            Array.from(
                                document.querySelectorAll(
                                    'link[rel="stylesheet"]'
                                )
                            ).some(item => item.href === hrefFinal);

                        if (!jaExiste) {

                            const novoLink =
                                document.createElement("link");

                            novoLink.rel =
                                "stylesheet";

                            novoLink.href =
                                hrefFinal;

                            document.head.appendChild(
                                novoLink
                            );

                        }

                    });


                /*
                 * IMPORTA <style> DO HTML CARREGADO
                 */

                documento
                    .querySelectorAll("head style")
                    .forEach(styleOriginal => {

                        const novoStyle =
                            document.createElement("style");

                        novoStyle.textContent =
                            styleOriginal.textContent;

                        document.head.appendChild(
                            novoStyle
                        );

                    });


                /*
                 * ==========================================
                 * PREPARA O CONTEÚDO DO BODY
                 * ==========================================
                 */

                const fragmento =
                    document.createElement("div");

                fragmento.innerHTML =
                    documento.body.innerHTML;


                /*
                 * Corrige caminhos relativos dentro
                 * do HTML carregado.
                 */

                fragmento
                    .querySelectorAll("[src]")
                    .forEach(elemento => {

                        const src =
                            elemento.getAttribute("src");

                        if (
                            !src ||
                            src.startsWith("data:") ||
                            src.startsWith("blob:")
                        ) {
                            return;
                        }

                        elemento.setAttribute(
                            "src",
                            new URL(
                                src,
                                urlBase
                            ).href
                        );

                    });


                fragmento
                    .querySelectorAll("[href]")
                    .forEach(elemento => {

                        const href =
                            elemento.getAttribute("href");

                        if (
                            !href ||
                            href.startsWith("#") ||
                            href.startsWith("mailto:") ||
                            href.startsWith("tel:") ||
                            href.startsWith("javascript:")
                        ) {
                            return;
                        }

                        elemento.setAttribute(
                            "href",
                            new URL(
                                href,
                                urlBase
                            ).href
                        );

                    });


                /*
                 * Guarda os scripts antes de inserir
                 * o conteúdo na página.
                 */

                const scripts =
                    Array.from(
                        fragmento.querySelectorAll(
                            "script"
                        )
                    );

                scripts.forEach(script => {
                    script.remove();
                });


                /*
                 * Insere o HTML no destino.
                 */

                elementoDestino.innerHTML = "";

                while (fragmento.firstChild) {
                    elementoDestino.appendChild(
                        fragmento.firstChild
                    );
                }


                /*
                 * ==========================================
                 * EXECUTA OS SCRIPTS DO HTML CARREGADO
                 * ==========================================
                 */

                for (const scriptOriginal of scripts) {

                    const novoScript =
                        document.createElement("script");

                    if (
                        scriptOriginal.hasAttribute(
                            "src"
                        )
                    ) {

                        novoScript.src =
                            new URL(
                                scriptOriginal.getAttribute(
                                    "src"
                                ),
                                urlBase
                            ).href;

                        /*
                         * Espera o script externo carregar
                         * antes de continuar.
                         */

                        await new Promise(
                            (resolve, reject) => {

                                novoScript.onload =
                                    resolve;

                                novoScript.onerror =
                                    reject;

                                document.body.appendChild(
                                    novoScript
                                );

                            }
                        );

                    } else {

                        novoScript.textContent =
                            scriptOriginal.textContent;

                        document.body.appendChild(
                            novoScript
                        );

                    }

                }

            } catch (erro) {

                console.error(
                    "Erro ao carregar HTML:",
                    caminho,
                    erro
                );

            }

        }


        /*
         * =========================================================
         * ABRIR PROGRAMA
         * =========================================================
         */

        async function abrirPrograma(
            caminho,
            id
        ) {

            const container =
                document.getElementById(
                    "programas-container"
                );

            if (!container) {
                console.error(
                    "Container de programas não encontrado."
                );
                return;
            }

            /*
             * Se o programa já estiver aberto,
             * apenas mostra novamente.
             */

            let programa =
                document.getElementById(id);

            if (programa) {

                programa.style.display =
                    "block";

                return;

            }


            /*
             * Cria uma DIV para o programa.
             * Não usamos mais iframe aqui.
             */

            programa =
                document.createElement(
                    "div"
                );

            programa.id =
                id;

            programa.className =
                "programa-popup";

            container.appendChild(
                programa
            );


            /*
             * Carrega o HTML do programa
             * dentro da DIV.
             */

            await carregarHTML(
                caminho,
                programa
            );

        }


        /*
         * Deixa a função disponível globalmente.
         * Isso ajuda durante a migração dos scripts.
         */

        window.abrirPrograma =
            abrirPrograma;


        /*
         * =========================================================
         * FECHAR PROGRAMA
         * =========================================================
         */

        function fecharPrograma(id) {

            const programa =
                document.getElementById(id);

            if (programa) {
                programa.remove();
            }

        }

        window.fecharPrograma =
            fecharPrograma;


        /*
         * =========================================================
         * COMPATIBILIDADE TEMPORÁRIA COM postMessage()
         * =========================================================
         *
         * Pode ser removido depois que todos os componentes
         * deixarem de usar iframe.
         */

        window.addEventListener(
            "message",
            function (event) {

                const dados =
                    event.data;

                if (!dados) {
                    return;
                }

                if (
                    dados.tipo ===
                    "abrirPrograma"
                ) {

                    abrirPrograma(
                        dados.caminho,
                        dados.id
                    );

                }

                if (
                    dados.tipo ===
                    "fecharPrograma"
                ) {

                    /*
                     * Compatibilidade temporária
                     * com o Gabrielzinho.
                     */

                    fecharPrograma(
                        dados.id ||
                        "programaGabrielzinho"
                    );

                }

            }
        );


        /*
         * =========================================================
         * CARREGA A TASKBAR AO INICIAR O DESKTOP
         * =========================================================
         */

        document.addEventListener(
            "DOMContentLoaded",
            async function () {

                await carregarHTML(
                    "windows_task.html",
                    "windows-task-container"
                );

                /*
                 * A taskbar já está no DOM.
                 * Agora adicionamos os eventos aos botões.
                 */
                iniciarWindowsTaskbar();

            }
        );

    </script>

</body>

</html>
