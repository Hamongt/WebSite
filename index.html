<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkyLike Desktop</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            overflow: hidden;

            /* FUNDO PADRÃO DO DESKTOP */
            background-image: url("./assets/images/bg/bg.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: "Segoe UI", sans-serif;
        }

        /* ==========================================
           ÁREA ONDE OS PROGRAMAS SERÃO ABERTOS
           ========================================== */
        #programas-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 48px;

            z-index: 100;

            background: transparent;

            /* O container não bloqueia o desktop */
            pointer-events: none;
        }

        /* ==========================================
           JANELA DE CADA PROGRAMA
           ========================================== */
        .programa-popup {
            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            width: 950px;
            height: 650px;

            border: none;
            background: transparent;

            /* O iframe do programa pode receber cliques */
            pointer-events: auto;

            z-index: 101;
        }

        /* ==========================================
           TASKBAR
           ========================================== */
        #windowsTask {
            position: fixed;

            left: 0;
            bottom: 0;

            width: 100%;
            height: 70px;

            border: none;
            background: transparent;

            z-index: 999999;
        }
    </style>

</head>

<body>

    <!-- ==========================================
         PROGRAMAS ABERTOS
         ========================================== -->
    <div id="programas-container"></div>


    <!-- ==========================================
         TASKBAR
         ========================================== -->
    <iframe
        src="windows_task.html"
        id="windowsTask"
        title="Windows Taskbar"
    ></iframe>


    <!-- ==========================================
         CONTROLE DOS PROGRAMAS
         ========================================== -->
    <script>

    function abrirPrograma(caminho, id) {

        const container =
            document.getElementById(
                "programas-container"
            );


        if (!container) {

            console.error(
                "Container de programas não encontrado."
            );

            return;

        }


        let programa =
            document.getElementById(id);


        /*
         * PROGRAMA JÁ ABERTO
         */
        if (programa) {

            programa.style.display =
                "block";

            return;

        }


        /*
         * CRIA O PROGRAMA
         */

        programa =
            document.createElement(
                "iframe"
            );


        programa.src =
            caminho;


        programa.id =
            id;


        programa.className =
            "programa-popup";


        programa.title =
            id;


        programa.setAttribute(
            "allowtransparency",
            "true"
        );


        container.appendChild(
            programa
        );

    }



    /*
     * ESCUTA A TASKBAR
     */

    window.addEventListener(
    "message",
    function (event) {

        const dados = event.data;

        if (!dados) {
            return;
        }


        /* ABRIR PROGRAMA */

        if (dados.tipo === "abrirPrograma") {

            abrirPrograma(
                dados.caminho,
                dados.id
            );

        }


        /* FECHAR PROGRAMA */

        if (dados.tipo === "fecharPrograma") {

            /*
             * Descobre qual iframe enviou
             * indiretamente a mensagem.
             *
             * Por enquanto, como temos apenas
             * o Gabrielzinho, fechamos ele.
             */

            const programa =
                document.getElementById(
                    "programaGabrielzinho"
                );

            if (programa) {
                programa.remove();
            }

        }

    }
);

</script>



</body>

</html>
