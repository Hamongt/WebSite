<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SkyLike - Main</title>

    <link rel="stylesheet" href="../../assets/css/windows_main.css">
    <style>

        /*
        O windows_main não possui background próprio.
        O fundo pertence ao index.html (desktop).
        */

        html,
        body {
            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            background: transparent !important;
            background-image: none !important;
        }


        /* COMPONENTES REUTILIZÁVEIS DA JANELA */
        .componente-navbar {
            display: block;
            width: 100%;
            height: 38px;
            border: 0;
            background: transparent;
            overflow: hidden;
        }

        .componente-logout {
            display: block;
            width: 100%;
            height: 48px;
            border: 0;
            background: transparent;
            overflow: hidden;
        }

    </style>

</head>


<body>


    <!-- ==========================================
         JANELA PRINCIPAL
         ========================================== -->

    <div
        class="janela"
        id="janelaPrincipal"
    >


        <!-- ======================================
             CABEÇALHO PADRÃO DA JANELA
             ====================================== -->

        <iframe
            src="../navbar_program.html"
            class="componente-navbar"
            id="navbarProgram"
            title="Barra da janela"
        ></iframe>


        <!-- ======================================
             MENU
             ====================================== -->

        <div class="menu">

            <button class="menu-btn">

                <img
                    src="../../assets/icones/files.png"
                    class="icone-files"
                    alt="files"
                >

                Calendário

            </button>


            <button class="menu-btn">
                ✏️ Edit
            </button>


            <button class="menu-btn">
                👁️ View
            </button>


            <button class="menu-btn">
                ⭐ Favorites
            </button>


            <a
                href="../../tools.html"
                class="menu-btn"
                style="text-decoration:none;"
            >
                🛠️ Tools
            </a>


            <button class="menu-btn">
                ❓ Help
            </button>


            <!-- PESQUISA -->

            <div class="search-container">

                <input
                    type="text"
                    class="search-input"
                    placeholder="🔍 Pesquisar..."
                >

                <button class="search-btn">
                    🔍
                </button>

            </div>

        </div>



        <!-- ======================================
             CONTEÚDO PRINCIPAL
             ====================================== -->

        <div
            class="conteudo"
            id="conteudoPrincipal"
        >


            <!-- ==================================
                 PERFIL
                 ================================== -->

            <div
                class="perfil"
                id="perfilContainer"
            >


                <img
                    id="fotoPerfil"
                    src="../../assets/icones/Sem título - 17 de julho de 2026 às 17.46.02.png"
                    class="foto-perfil"
                >


                <div class="info-perfil">


                    <h1 id="nomePerfil">
                        Gabrielzinho!
                    </h1>


                    <p id="subtituloPerfil">

                        Bem-vindo ao meu mundo!

                        <img
                            src="../../assets/icones/pika.gif"
                            alt="GIF animado"
                            style="
                                width:25px;
                                height:25px;
                                vertical-align:middle;
                            "
                        >

                    </p>


                    <p
                        class="descricao"
                        id="descricaoPerfil"
                    >
                        🌊 Frutiger Aero • HAMONZINHO • Y2K
                    </p>


                    <!-- LINKS SOCIAIS -->

                    <div
                        class="social-links-usuario"
                        id="socialLinks"
                    >
                    </div>


                </div>

            </div>


            <!-- ==================================
                 AQUI CONTINUA O CONTEÚDO
                 DA SUA JANELA ORIGINAL
                 ================================== -->

            <div class="conteudo-extra">


                <!-- REDES SOCIAIS -->

                <div class="social-icons">


                    <a
                        href="https://www.tiktok.com/@gabrieltaveira1"
                        target="_blank"
                        class="social-link"
                    >

                        <img
                            src="../../assets/icones/tiktok.png"
                            class="icone-social"
                        >

                        <span>TikTok</span>

                    </a>


                    <a
                        href="https://www.instagram.com/gabriel_taveira12/"
                        target="_blank"
                        class="social-link"
                    >

                        <img
                            src="../../assets/icones/instagram.png"
                            class="icone-social"
                        >

                        <span>Instagram</span>

                    </a>


                    <a
                        href="https://www.linkedin.com/in/gabriel-taveira12"
                        target="_blank"
                        class="social-link"
                    >

                        <img
                            src="../../assets/icones/LinkedIn.png"
                            class="icone-social"
                        >

                        <span>LinkedIn</span>

                    </a>


                </div>



                <!-- ==================================
                     PLAYER DE MÚSICA
                     ================================== -->

                <div class="player-musica">

                    <span class="musica-info">

                        <img
                            src="../../assets/icones/music.png"
                            class="icone-titulo"
                        >

                        Música Ambiente

                    </span>


                    <div class="volume-wrapper">

                        <button
                            class="btn-play"
                            id="playPauseBtn"
                        >
                            ⏸️
                        </button>


                        <div class="volume-popup">

                            <input
                                type="range"
                                id="volumeControl"
                                min="0"
                                max="1"
                                step="0.01"
                                value="0.03"
                                class="volume-slider-horizontal"
                            >

                            <span
                                class="volume-label"
                                id="volumeLabel"
                            >
                                3%
                            </span>

                        </div>

                    </div>

                </div>





                <!-- ==================================
                     RODAPÉ / SAIR PADRÃO
                     ================================== -->

                <iframe
                    src="../logout.html"
                    class="componente-logout"
                    id="logoutProgram"
                    title="Rodapé da janela"
                ></iframe>

</div>

        </div>

    </div>


    <!-- ==========================================
         ÁUDIO
         ========================================== -->

    <audio
        id="musicaAmbiente"
        loop
    >

        <source
            src="../../assets/social-media-phone-icons/Musicas/musica.mp3"
            type="audio/mpeg"
        >

    </audio>


    <!-- ==========================================
         JAVASCRIPT DA JANELA
         ========================================== -->

    <script src="../../assets/scripts/script.js"></script>


</body>

</html>
