<div class="barra">

    <div class="titulo">

        <img
            src="../assets/icones/iconeverde.png"
            class="icone-titulo"
            alt=""
        >

        <span id="saudacao">
            Gabriel Taveira
        </span>

    </div>

    <div class="botoes">

        <button
            class="min"
            id="minimizarPrograma"
        >
            ─
        </button>

        <button
            class="max"
            id="maximizarPrograma"
        >
            □
        </button>

        <button
            class="close"
            id="fecharPrograma"
        >
            ✕
        </button>

    </div>

</div>

<script>
    (function () {

        const botaoFechar =
            document.getElementById(
                "fecharPrograma"
            );

        const botaoMinimizar =
            document.getElementById(
                "minimizarPrograma"
            );

        const botaoMaximizar =
            document.getElementById(
                "maximizarPrograma"
            );


        /* FECHAR */

        if (botaoFechar) {

            botaoFechar.addEventListener(
                "click",
                function () {

                    const programa =
                        botaoFechar.closest(
                            ".programa-popup"
                        );

                    if (programa) {
                        programa.remove();
                    }

                }
            );

        }


        /* MINIMIZAR */

        if (botaoMinimizar) {

            botaoMinimizar.addEventListener(
                "click",
                function () {

                    const programa =
                        botaoMinimizar.closest(
                            ".programa-popup"
                        );

                    if (programa) {
                        programa.style.display =
                            "none";
                    }

                }
            );

        }


        /* MAXIMIZAR */

        if (botaoMaximizar) {

            botaoMaximizar.addEventListener(
                "click",
                function () {

                    const programa =
                        botaoMaximizar.closest(
                            ".programa-popup"
                        );

                    if (programa) {

                        programa.classList.toggle(
                            "maximizado"
                        );

                    }

                }
            );

        }

    })();
</script>
